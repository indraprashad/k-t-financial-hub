<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Single Page App</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    // This script takes the current url and converts the path and query
    // string into just a query string, and then redirects back to the index
    // page with that query string. The path information is in the hash part
    // of the URL.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, -1).join('/') + '/#' + l.hash.slice(1)
    );
  </script>
</head>
<body>
</body>
</html>
