name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'yarn'
      
      - name: Clean install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Build
        run: yarn build
      
      - name: Verify dist directory exists
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist directory not found!"
            exit 1
          fi
          echo "✓ dist directory exists"
      
      - name: Verify index.html exists
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: dist/index.html not found!"
            exit 1
          fi
          echo "✓ dist/index.html exists"
      
      - name: List dist contents
        run: |
          echo "=== Dist Directory Contents ==="
          ls -lah dist/
          echo ""
          echo "=== Total size ==="
          du -sh dist/
          echo ""
          echo "=== File count ==="
          find dist -type f | wc -l
          echo "files found"
      
      - name: Validate dist structure
        run: |
          echo "=== Checking critical files ==="
          for file in index.html assets; do
            if [ -e "dist/$file" ]; then
              echo "✓ $file found"
            else
              echo "⚠ WARNING: $file not found"
            fi
          done

      - name: Copy .nojekyll to dist
        run: |
          cp .nojekyll dist/.nojekyll
          echo "✓ Copied .nojekyll to dist"
          ls -la dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: www.kt-info.com
          force_orphan: true